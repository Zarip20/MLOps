name: MLOps CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run init
        run: |
          python run.py -mode init 2>&1 | tee training.log
          
      - name: Train on multiple batches
        run: |
          for i in {1..12}; do
          echo "Iteration $i"
          python run.py -mode update >> training.log 2>&1
          done
          
      - name: Generate summary report
        run: 
          python run.py -mode summary >> training.log 2>&1
        
      - name: Upload logs and summary
        uses: actions/upload-artifact@v4
        with:
          name: training-artifacts
          path: |
            training.log
            reports/*.txt
          if-no-files-found: warn
